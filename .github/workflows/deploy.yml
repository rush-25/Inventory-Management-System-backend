name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore MiniInventorySystem.sln

    - name: Build
      run: dotnet build MiniInventorySystem.sln --configuration Release --no-restore

    - name: Publish
      run: dotnet publish MiniInventory.API/MiniInventory.API.csproj -c Release -o publish --no-restore

    - name: Create ZIP
      run: cd publish && zip -r ../deploy.zip . && cd ..

    - name: Deploy to Elastic Beanstalk
      uses: einaregilsson/beanstalk-deploy@v21
      with:
        aws_access_key: ${{ secrets.AWS_ACCESS_KEY }}
        aws_secret_key: ${{ secrets.AWS_SECRET_KEY }}
        application_name: Inventory-Management-System-backend
        environment_name: Inventory-Management-System-back-env
        version_label: v-${{ github.run_number }}-${{ github.run_attempt }}
        region: eu-north-1
        deployment_package: deploy.zip
        wait_for_deployment: true
